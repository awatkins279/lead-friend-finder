<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 110" width="360" height="110">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C084FC"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>

    <linearGradient id="hammerFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D8B4FE"/>
      <stop offset="50%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#6D28D9"/>
    </linearGradient>

    <linearGradient id="hammerSide" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#4C1D95"/>
    </linearGradient>

    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#5B21B6"/>
    </linearGradient>

    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E0A3C"/>
      <stop offset="100%" style="stop-color:#0D0520"/>
    </linearGradient>

    <linearGradient id="wordGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#D8B4FE"/>
    </linearGradient>

    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C084FC"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>

    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0A0A1A;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="impactGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C084FC;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </radialGradient>

    <filter id="hammerGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="sparkGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="bigGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="360" height="110" fill="#08061A" rx="12"/>

  <!-- Purple ambient glow behind icon -->
  <ellipse cx="55" cy="55" rx="52" ry="52" fill="url(#glowPurple)"/>

  <!-- Icon rounded square -->
  <rect x="10" y="10" width="88" height="88" rx="20" fill="url(#iconBg)"/>

  <!-- Purple border -->
  <rect x="10" y="10" width="88" height="88" rx="20"
        fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.7"/>

  <!-- ===================== -->
  <!-- THOR'S HAMMER (MJOLNIR) — angled slightly, pointing down-right -->
  <!-- Centered in icon, tilted ~20deg clockwise -->
  <!-- ===================== -->

  <!-- Group with rotation transform centered on icon -->
  <g transform="translate(54, 52) rotate(30)">

    <!-- HAMMER HEAD — wide rectangular block -->
    <!-- Main face -->
    <rect x="-20" y="-26" width="40" height="28" rx="5"
          fill="url(#hammerFace)" filter="url(#hammerGlow)"/>

    <!-- Top edge highlight -->
    <rect x="-20" y="-26" width="40" height="5" rx="4"
          fill="#E9D5FF" opacity="0.5"/>

    <!-- Left side darker face (3D effect) -->
    <rect x="-20" y="-26" width="5" height="28" rx="3"
          fill="url(#hammerSide)" opacity="0.8"/>

    <!-- Rivets / detail on hammer face -->
    <circle cx="-10" cy="-14" r="2.5" fill="#4C1D95" opacity="0.6"/>
    <circle cx="10" cy="-14" r="2.5" fill="#4C1D95" opacity="0.6"/>

    <!-- Center rune line — subtle engraving -->
    <line x1="-6" y1="-20" x2="6" y2="-20"
          stroke="#E9D5FF" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="-23" x2="0" y2="-17"
          stroke="#E9D5FF" stroke-width="1" opacity="0.4"/>

    <!-- HANDLE WRAP — short stubby handle below head -->
    <!-- Handle shaft -->
    <rect x="-5" y="2" width="10" height="30" rx="3"
          fill="url(#handleGrad)"/>

    <!-- Handle grip wrap lines -->
    <line x1="-5" y1="10" x2="5" y2="10" stroke="#E9D5FF" stroke-width="1" opacity="0.3"/>
    <line x1="-5" y1="18" x2="5" y2="18" stroke="#E9D5FF" stroke-width="1" opacity="0.3"/>
    <line x1="-5" y1="26" x2="5" y2="26" stroke="#E9D5FF" stroke-width="1" opacity="0.3"/>

    <!-- Handle strap / pommel at bottom -->
    <ellipse cx="0" cy="32" rx="7" ry="4" fill="#A855F7" opacity="0.9"/>

    <!-- Strap loop hanging off pommel -->
    <path d="M -4 32 Q -10 40 -4 42 Q 0 43 4 42 Q 10 40 4 32"
          fill="none" stroke="#C084FC" stroke-width="2"
          stroke-linecap="round" opacity="0.7"/>

  </g>

  <!-- ===================== -->
  <!-- IMPACT GLOW at bottom of hammer -->
  <!-- ===================== -->
  <ellipse cx="68" cy="80" rx="12" ry="5" fill="#A855F7" opacity="0.25" filter="url(#bigGlow)"/>

  <!-- ===================== -->
  <!-- SPARKS — radiating from impact zone bottom-right of hammer -->
  <!-- ===================== -->

  <!-- Spark 1 — upper right long -->
  <line x1="68" y1="76" x2="80" y2="60"
        stroke="#C084FC" stroke-width="1.8" stroke-linecap="round"
        filter="url(#sparkGlow)" opacity="0.9"/>
  <circle cx="81" cy="59" r="2.2" fill="#E9D5FF" filter="url(#sparkGlow)" opacity="0.95"/>

  <!-- Spark 2 — right short -->
  <line x1="70" y1="78" x2="82" y2="72"
        stroke="#A855F7" stroke-width="1.5" stroke-linecap="round"
        filter="url(#sparkGlow)" opacity="0.8"/>
  <circle cx="83" cy="71" r="1.8" fill="#C084FC" filter="url(#sparkGlow)" opacity="0.85"/>

  <!-- Spark 3 — upper left -->
  <line x1="64" y1="76" x2="54" y2="63"
        stroke="#DDD6FE" stroke-width="1.5" stroke-linecap="round"
        filter="url(#sparkGlow)" opacity="0.75"/>
  <circle cx="53" cy="62" r="1.8" fill="white" filter="url(#sparkGlow)" opacity="0.85"/>

  <!-- Spark 4 — far upper right tiny -->
  <line x1="70" y1="75" x2="84" y2="64"
        stroke="#7C3AED" stroke-width="1" stroke-linecap="round"
        filter="url(#sparkGlow)" opacity="0.6"/>
  <circle cx="85" cy="63" r="1.2" fill="#A855F7" filter="url(#sparkGlow)" opacity="0.7"/>

  <!-- Spark 5 — downward left -->
  <line x1="63" y1="80" x2="53" y2="88"
        stroke="#C084FC" stroke-width="1.2" stroke-linecap="round"
        filter="url(#sparkGlow)" opacity="0.6"/>
  <circle cx="52" cy="89" r="1.3" fill="#DDD6FE" filter="url(#sparkGlow)" opacity="0.7"/>

  <!-- Spark 6 — tiny scattered -->
  <circle cx="77" cy="56" r="1" fill="#F5F3FF" filter="url(#sparkGlow)" opacity="0.6"/>
  <circle cx="86" cy="68" r="1" fill="#C084FC" filter="url(#sparkGlow)" opacity="0.5"/>
  <circle cx="50" cy="70" r="1" fill="#DDD6FE" filter="url(#sparkGlow)" opacity="0.5"/>

  <!-- ===================== -->
  <!-- WORDMARK -->
  <!-- ===================== -->

  <!-- FORGE text -->
  <text x="114" y="56"
        font-family="'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="36"
        font-weight="800"
        letter-spacing="1"
        fill="url(#wordGrad)">FORGE</text>

  <!-- Thin divider line -->
  <line x1="114" y1="62" x2="348" y2="62"
        stroke="#7C3AED" stroke-width="0.5" opacity="0.3"/>

  <!-- AI pill -->
  <rect x="114" y="68" width="34" height="18" rx="9" fill="url(#aiGrad)" opacity="0.95"/>
  <text x="131" y="81"
        font-family="'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="10"
        font-weight="800"
        letter-spacing="2"
        text-anchor="middle"
        fill="white">AI</text>

  <!-- Tagline -->
  <text x="155" y="80.5"
        font-family="'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="10"
        font-weight="400"
        letter-spacing="4"
        fill="#6B5B8E">SALES INTELLIGENCE</text>

  <!-- Top right decorative dots -->
  <circle cx="344" cy="18" r="2" fill="#7C3AED" opacity="0.5"/>
  <circle cx="350" cy="18" r="2" fill="#A855F7" opacity="0.4"/>
  <circle cx="350" cy="24" r="1.5" fill="#C084FC" opacity="0.3"/>

</svg>
